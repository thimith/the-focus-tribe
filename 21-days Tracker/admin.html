<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#F5F5F7">
  <link rel="manifest" href="manifest.json">
  <title>Admin — Focus Tribe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --orange:    #FF5500;
      --orange-dk: #CC4400;
      --orange-lt: rgba(255,85,0,0.1);
      --green:     #34C759;
      --green-lt:  rgba(52,199,89,0.1);
      --red:       #FF3B30;
      --red-lt:    rgba(255,59,48,0.08);
      --yellow:    #FF9F0A;
      --blue:      #007AFF;
      --blue-lt:   rgba(0,122,255,0.1);
      --bg:        #F5F5F7;
      --card:      #FFFFFF;
      --text:      #1C1C1E;
      --muted:     #8E8E93;
      --border:    #E5E5EA;
      --shadow:    0 1px 3px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.04);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100dvh;
      padding-bottom: calc(72px + env(safe-area-inset-bottom));
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 0 20px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .header-logo { display: flex; align-items: center; gap: 8px; font-size: 1.05rem; font-weight: 900; color: var(--text); letter-spacing: -0.02em; text-decoration: none; }
    .header-logo img { width: 28px; height: 28px; border-radius: 50%; }
    .admin-badge {
      font-size: 0.68rem; font-weight: 800; color: var(--orange);
      background: var(--orange-lt); padding: 3px 9px; border-radius: 100px;
      text-transform: uppercase; letter-spacing: 0.07em;
    }

    /* ── Tabs ── */
    .tab-bar {
      background: var(--card); border-bottom: 1px solid var(--border);
      display: flex; overflow-x: auto; scrollbar-width: none;
      position: sticky; top: 56px; z-index: 99;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex-shrink: 0; padding: 12px 20px;
      font-family: inherit; font-size: 0.82rem; font-weight: 700;
      color: var(--muted); background: none; border: none;
      border-bottom: 2.5px solid transparent; cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .tab-btn.active { color: var(--orange); border-bottom-color: var(--orange); }

    /* ── Content ── */
    .content { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: flex; flex-direction: column; gap: 12px; }

    /* ── Cards ── */
    .card {
      background: var(--card); border-radius: 16px;
      padding: 18px; box-shadow: var(--shadow);
    }
    .card-title {
      font-size: 0.85rem; font-weight: 800; color: var(--text);
      letter-spacing: -0.01em; margin-bottom: 14px;
    }
    .card-title small {
      font-size: 0.72rem; font-weight: 500; color: var(--muted);
      margin-left: 6px; letter-spacing: 0;
    }

    /* ── Form elements ── */
    .form-field { margin-bottom: 12px; }
    .form-label {
      display: block; font-size: 0.7rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px;
    }
    .form-input, .form-select {
      width: 100%; padding: 11px 13px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 0.92rem; font-family: inherit; color: var(--text);
      background: var(--bg); outline: none; transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .form-input:focus, .form-select:focus { border-color: var(--orange); }
    .form-input:disabled { opacity: 0.5; }
    .btn {
      padding: 11px 20px; font-family: inherit; font-size: 0.88rem; font-weight: 700;
      border-radius: 10px; cursor: pointer; border: none; transition: all 0.15s;
    }
    .btn.primary { background: var(--orange); color: #fff; }
    .btn.primary:hover  { background: var(--orange-dk); }
    .btn.primary:active { transform: scale(0.97); }
    .btn.secondary { background: var(--bg); color: var(--muted); border: 1.5px solid var(--border); }
    .btn.danger  { background: var(--red-lt); color: var(--red); }
    .btn.full { width: 100%; }
    .btn-row { display: flex; gap: 8px; }

    /* ── Member list ── */
    .member-row {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 0; border-bottom: 1px solid var(--border);
    }
    .member-row:last-child { border-bottom: none; }
    .member-avatar {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      background: var(--orange-lt); color: var(--orange);
      font-size: 0.88rem; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }
    .member-info { flex: 1; min-width: 0; }
    .member-name { font-size: 0.88rem; font-weight: 700; color: var(--text); }
    .member-email { font-size: 0.74rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .member-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .icon-btn {
      width: 30px; height: 30px; border-radius: 8px;
      border: none; cursor: pointer; font-size: 0.8rem;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .icon-btn.edit   { background: var(--blue-lt); color: var(--blue); }
    .icon-btn.remove { background: var(--red-lt);  color: var(--red); }

    /* Strike badges */
    .strikes-row { display: flex; gap: 4px; align-items: center; margin-top: 2px; }
    .strike-pip { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
    .strike-pip.active { background: var(--red); }
    .redemption-status {
      font-size: 0.7rem; font-weight: 700;
      padding: 2px 7px; border-radius: 6px;
    }
    .redemption-status.pending { background: var(--red-lt); color: var(--red); }
    .redemption-status.clear   { background: var(--green-lt); color: var(--green); }

    /* Override goal cards */
    .override-goal-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .override-goal-row:last-child { border-bottom: none; }
    .override-goal-name { flex: 1; font-size: 0.88rem; color: var(--text); font-weight: 500; }
    .override-input {
      width: 70px; padding: 7px 8px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 0.88rem; font-family: inherit; color: var(--text);
      background: var(--bg); text-align: center; outline: none;
      transition: border-color 0.2s;
    }
    .override-input:focus { border-color: var(--orange); }
    .override-toggle {
      width: 44px; height: 26px; border-radius: 100px;
      border: none; cursor: pointer; position: relative;
      transition: background 0.2s; flex-shrink: 0;
    }
    .override-toggle.on  { background: var(--green); }
    .override-toggle.off { background: var(--border); }
    .toggle-knob {
      position: absolute; top: 3px;
      width: 20px; height: 20px; border-radius: 50%;
      background: white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
      transition: left 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .override-toggle.on  .toggle-knob { left: 21px; }
    .override-toggle.off .toggle-knob { left: 3px; }

    /* Goals edit panel */
    .goals-list { display: flex; flex-direction: column; gap: 8px; }
    .goal-edit-row {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; background: var(--bg); border-radius: 10px;
    }
    .goal-edit-name { flex: 1; font-size: 0.88rem; color: var(--text); font-weight: 600; }
    .goal-edit-type { font-size: 0.72rem; color: var(--muted); }
    .goal-edit-config { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }

    /* Cohort card */
    .cohort-card {
      background: var(--card); border-radius: 14px;
      padding: 14px 16px; box-shadow: var(--shadow);
      display: flex; align-items: center; gap: 12px;
      cursor: pointer; transition: transform 0.1s;
    }
    .cohort-card:active { transform: scale(0.985); }
    .cohort-card.selected { border: 2px solid var(--orange); }
    .cohort-info { flex: 1; }
    .cohort-name  { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .cohort-meta  { font-size: 0.74rem; color: var(--muted); }
    .cohort-day-badge {
      font-size: 0.7rem; font-weight: 800;
      padding: 3px 9px; border-radius: 100px;
      background: var(--orange-lt); color: var(--orange);
    }

    /* Success / error flash */
    .flash {
      padding: 10px 14px; border-radius: 10px;
      font-size: 0.82rem; font-weight: 600;
      display: none;
    }
    .flash.success { background: var(--green-lt); color: var(--green); display: block; }
    .flash.error   { background: var(--red-lt);   color: var(--red);   display: block; }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--card); border-top: 1px solid var(--border);
      display: flex; padding: 6px 0 max(6px, env(safe-area-inset-bottom)); z-index: 100;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 2px; padding: 6px 0;
      cursor: pointer; text-decoration: none;
    }
    .nav-icon  { font-size: 1.3rem; line-height: 1; }
    .nav-label { font-size: 0.75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .nav-item.active .nav-label { color: var(--orange); }

    .empty-state { text-align: center; padding: 32px 16px; font-size: 0.84rem; color: var(--muted); line-height: 1.6; }
    .divider { height: 1px; background: var(--border); margin: 2px 0; }
    .section-label {
      font-size: 0.68rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-logo"><img src="brand_assets/logo_eye.png" alt="">The Focus Tribe</div>
    <div class="admin-badge">Admin</div>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('members')">Members</button>
    <button class="tab-btn"        onclick="switchTab('goals')">Goals</button>
    <button class="tab-btn"        onclick="switchTab('override')">Override</button>
    <button class="tab-btn"        onclick="switchTab('cohorts')">Cohorts</button>
  </div>

  <div class="content">
    <!-- ── Tab: Members ── -->
    <div class="tab-panel active" id="tab-members"></div>

    <!-- ── Tab: Goals ── -->
    <div class="tab-panel" id="tab-goals"></div>

    <!-- ── Tab: Override ── -->
    <div class="tab-panel" id="tab-override"></div>

    <!-- ── Tab: Cohorts ── -->
    <div class="tab-panel" id="tab-cohorts"></div>
  </div>

  <nav class="bottom-nav">
    <a class="nav-item" href="app.html">
      <span class="nav-label">Today</span>
    </a>
    <a class="nav-item" href="cohort.html">
      <span class="nav-label">Cohort</span>
    </a>
    <a class="nav-item active" href="admin.html">
      <span class="nav-label">Admin</span>
    </a>
    <a class="nav-item" href="me.html">
      <span class="nav-label">Me</span>
    </a>
  </nav>

  <script>
    const ADMIN_EMAIL = 'thierry.muller@gmail.com';

    // ── Data layer ───────────────────────────────────────────────────────
    const db = {
      get(k)   { try { return JSON.parse(localStorage.getItem('ft_'+k)); } catch(e){ return null; } },
      set(k,v) { localStorage.setItem('ft_'+k, JSON.stringify(v)); },
      uid()    { return Date.now().toString(36)+Math.random().toString(36).substr(2,5); },
      getSession()   { return this.get('session'); },
      clearSession() { localStorage.removeItem('ft_session'); },
      getUsers()     { return this.get('users')     || {}; },
      getCohorts()   { return this.get('cohorts')   || {}; },
      getGoals()     { return this.get('goals')     || {}; },
      getCheckins()  { return this.get('checkins')  || {}; },
      getRedemptions(){ return this.get('redemptions') || {}; },
      getUser(id)    { return this.getUsers()[id]   || null; },
      getCohort(id)  { return this.getCohorts()[id] || null; },

      getCohortDay(startDate, targetDate) {
        const s = new Date(startDate); s.setHours(0,0,0,0);
        const t = targetDate ? new Date(targetDate) : new Date(); t.setHours(0,0,0,0);
        return Math.floor((t-s)/86400000)+1;
      },
      getCurrentCohort(userId) {
        const all = Object.values(this.getCohorts()).filter(c=>c.memberIds&&c.memberIds.includes(userId));
        if (!all.length) return null;
        const active = all.find(c=>{ const d=this.getCohortDay(c.startDate); return d>=1&&d<=21; });
        return active || all.sort((a,b)=>new Date(b.startDate)-new Date(a.startDate))[0];
      },
      getGoalsForUser(userId, cohortId) {
        return Object.values(this.getGoals())
          .filter(g=>g.userId===userId&&g.cohortId===cohortId)
          .sort((a,b)=>a.order-b.order);
      },
      getCheckin(goalId, date) { return this.getCheckins()[`${goalId}_${date}`] || null; },
      setCheckin(goalId, date, value, overriddenBy=null) {
        const cs=this.getCheckins(), g=this.getGoals()[goalId]; if(!g) return;
        cs[`${goalId}_${date}`]={ id:`${goalId}_${date}`,goalId,userId:g.userId,cohortId:g.cohortId,date,value,updatedAt:new Date().toISOString(),overriddenBy };
        this.set('checkins',cs);
      },
      upsertGoal(g) { const gs=this.getGoals(); gs[g.id]=g; this.set('goals',gs); },
      deleteGoal(id){ const gs=this.getGoals(); delete gs[id]; this.set('goals',gs); },
      getRedemptionsForUser(userId, cohortId) {
        return Object.values(this.getRedemptions())
          .filter(r=>r.userId===userId&&r.cohortId===cohortId)
          .sort((a,b)=>a.strikeNumber-b.strikeNumber);
      },
      clearRedemptions(userId, cohortId) {
        const r = this.getRedemptions();
        Object.keys(r).forEach(k=>{ if(r[k].userId===userId&&r[k].cohortId===cohortId) delete r[k]; });
        this.set('redemptions', r);
      },
      upsertUser(u) { const us=this.getUsers(); us[u.id]=u; this.set('users',us); },
      upsertCohort(c){ const cs=this.getCohorts(); cs[c.id]=c; this.set('cohorts',cs); },
      seedIfEmpty() {
        if (this.get('seeded_v8')) return;
        this.set('users', {
          'u_admin': { id:'u_admin', email:'thierry.muller@gmail.com', name:'Thierry', role:'admin' },
          'u_alex':  { id:'u_alex',  email:'alex@example.com',  name:'Alex',  role:'member' },
          'u_jack':  { id:'u_jack',  email:'jack@example.com',  name:'Jack',  role:'member' },
          'u_ruben': { id:'u_ruben', email:'ruben@example.com', name:'Ruben', role:'member' },
          'u_sara':  { id:'u_sara',  email:'sara@example.com',  name:'Sara',  role:'member' },
          'u_james': { id:'u_james', email:'james@example.com', name:'James', role:'member' },
          'u_priya': { id:'u_priya', email:'priya@example.com', name:'Priya', role:'member' },
        });
        this.set('cohorts', {
          'c_04_26_01': { id:'c_04_26_01', name:'Mar 16 Cohort', startDate:'2026-03-16', memberIds:['u_admin','u_alex','u_jack','u_ruben'], createdBy:'u_admin', createdAt:new Date().toISOString() },
          'c_04_26_02': { id:'c_04_26_02', name:'Apr 6 Cohort',   startDate:'2026-04-06', memberIds:['u_sara','u_james','u_priya'],          createdBy:'u_admin', createdAt:new Date().toISOString() },
        });
        const goals = {};
        const add = (userId, cohortId, list) => list.forEach((g,i) => { goals[g.id] = { ...g, userId, cohortId, locked:true, createdAt:new Date().toISOString(), order:i }; });
        add('u_admin','c_04_26_01',[{id:'g_t1',type:'weekly_count',title:'Meditate or Journal 10min',config:{weeklyTarget:5}},{id:'g_t2',type:'weekly_count',title:'Drink 2L of Water',config:{weeklyTarget:5}},{id:'g_t3',type:'weekly_count',title:'Plan Next Day Before Bed',config:{weeklyTarget:5}},{id:'g_t4',type:'weekly_count',title:'Exercise 45min+',config:{weeklyTarget:5}},{id:'g_t5',type:'weekly_count',title:'No-Fap Rule',config:{weeklyTarget:5}},{id:'g_t6',type:'daily_time_max',title:'Instagram',config:{weeklyMaxMinutes:70}},{id:'g_t7',type:'daily_time_max',title:'YouTube',config:{weeklyMaxMinutes:210}},{id:'g_t8',type:'weekly_count',title:'Get Feedback (4 people/wk)',config:{weeklyTarget:4}},{id:'g_t9',type:'milestone',title:'Build Focus Tracker',config:{}},{id:'g_t10',type:'milestone',title:'Collect 3 Video Testimonials',config:{}}]);
        add('u_alex','c_04_26_01',[{id:'g_ax1',type:'weekly_count',title:'Drink 2L Water',config:{weeklyTarget:5}},{id:'g_ax2',type:'weekly_count',title:'30g+ Protein 4x/day',config:{weeklyTarget:5}},{id:'g_ax3',type:'weekly_count',title:'Chest Workout',config:{weeklyTarget:1}},{id:'g_ax4',type:'weekly_count',title:'Job Applications',config:{weeklyTarget:3}}]);
        add('u_jack','c_04_26_01',[{id:'g_jk1',type:'weekly_count',title:'3 Rejections',config:{weeklyTarget:3}},{id:'g_jk2',type:'weekly_count',title:'Cold Outreach (1+/day)',config:{weeklyTarget:5}},{id:'g_jk3',type:'weekly_count',title:'Exercise 30min+',config:{weeklyTarget:4}},{id:'g_jk4',type:'weekly_count',title:'Laptop Out of Bedroom',config:{weeklyTarget:4}},{id:'g_jk5',type:'weekly_count',title:'The Office in Spanish (1 ep+)',config:{weeklyTarget:5}}]);
        add('u_ruben','c_04_26_01',[{id:'g_rb1',type:'weekly_count',title:'Journal Within 4h of Waking',config:{weeklyTarget:5}},{id:'g_rb2',type:'weekly_count',title:'Set Alarm Before Bed',config:{weeklyTarget:5}},{id:'g_rb3',type:'weekly_count',title:'Stretching / Posture 5min',config:{weeklyTarget:5}},{id:'g_rb4',type:'weekly_count',title:'Breathwork',config:{weeklyTarget:1}}]);
        add('u_sara','c_04_26_02',[{id:'g_s1',type:'daily_boolean',title:'Morning run',config:{}},{id:'g_s2',type:'weekly_count',title:'Yoga',config:{weeklyTarget:3}},{id:'g_s3',type:'milestone',title:'Write a chapter',config:{}}]);
        add('u_james','c_04_26_02',[{id:'g_j1',type:'daily_boolean',title:'Cold shower',config:{}},{id:'g_j2',type:'daily_boolean',title:'No sugar',config:{}},{id:'g_j3',type:'weekly_count',title:'Gym',config:{weeklyTarget:5}}]);
        add('u_priya','c_04_26_02',[{id:'g_p1',type:'daily_boolean',title:'Meditate',config:{}},{id:'g_p2',type:'daily_time_min',title:'Study Spanish',config:{weeklyTargetMinutes:120}},{id:'g_p3',type:'milestone',title:'Ship side project',config:{}}]);
        this.set('goals', goals);
        this.set('stakes', {
          'u_admin_c_04_26_01': {complete:'Take a full day off — 100% not productive.',r1:'Run 5km with proof',r2:'Run 7km with proof + 100 push-ups on video',fail:'Run 10km with proof + 100 push-ups on video'},
          'u_alex_c_04_26_01':  {complete:'',r1:'Wake up 6–8am next business day and work on most important challenge task',r2:'Wake up 6–8am next 2 business days and work on most important challenge task',fail:'Pay everyone $20 (total $60)'},
          'u_jack_c_04_26_01':  {complete:'Tres Cruces sunrise',r1:'100 push-ups · teammates do 50 push-ups',r2:'50 press-ups · teammates do 20 pull-ups',fail:'100 push-ups + 50 pull-ups'},
          'u_ruben_c_04_26_01': {complete:'[Reward TBD]',r1:'Run on treadmill for 15 minutes',r2:'Run on treadmill for 30 minutes',fail:'Run on treadmill for 45 minutes'},
        });
        this.set('seeded_v8', true);
      },
    };

    // ── Auth guard ───────────────────────────────────────────────────────
    db.seedIfEmpty();
    const session = db.getSession();
    if (!session?.userId) { window.location.href='index.html'; }
    if (session.role !== 'admin') { window.location.href='app.html'; }

    const cohort = db.getCurrentCohort(session.userId);

    // ── Tab state ────────────────────────────────────────────────────────
    let activeTab          = 'members';
    let membersCohortId    = cohort?.id || null;
    let overrideMemberId   = null;
    let overrideDate       = new Date().toISOString().split('T')[0];
    let goalsMemberId      = null;
    let addGoalFormOpen    = false;
    let addGoalFrame       = 'daily';    // daily | weekly | milestone
    let addGoalMetric      = 'boolean';  // boolean | count | min_time | max_time
    let addGoalTitle       = '';
    let newMemberEmail     = '';

    function switchTab(tab) {
      activeTab = tab;
      document.querySelectorAll('.tab-btn').forEach((b,i)=>{
        b.classList.toggle('active', ['members','goals','override','cohorts'][i]===tab);
      });
      document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
      document.getElementById(`tab-${tab}`).classList.add('active');
      renderTab(tab);
    }

    function renderTab(tab) {
      if (tab==='members')  renderMembers();
      if (tab==='goals')    renderGoals();
      if (tab==='override') renderOverride();
      if (tab==='cohorts')  renderCohorts();
    }

    // ════════════════════════════════════════════════════════════════════
    // TAB: MEMBERS
    // ════════════════════════════════════════════════════════════════════
    function renderMembers() {
      const allCohorts = Object.values(db.getCohorts()).sort((a,b)=>new Date(b.startDate)-new Date(a.startDate));
      if (!allCohorts.length) { document.getElementById('tab-members').innerHTML='<div class="empty-state">No cohorts found.</div>'; return; }
      if (!membersCohortId) membersCohortId = allCohorts[0].id;
      const mc = db.getCohort(membersCohortId);
      if (!mc) { membersCohortId = allCohorts[0].id; return renderMembers(); }

      const cohortOptions = allCohorts.map(c=>`<option value="${c.id}"${c.id===membersCohortId?' selected':''}>${c.name}</option>`).join('');
      const members = (mc.memberIds||[]).map(id=>db.getUser(id)).filter(Boolean);

      const rows = members.map(m => {
        const redemptions = db.getRedemptionsForUser(m.id, mc.id);
        const pending     = redemptions.filter(r=>r.status==='pending');
        const pips        = [1,2,3].map(n=>`<div class="strike-pip${n<=redemptions.length?' active':''}"></div>`).join('');
        const status      = pending.length
          ? `<span class="redemption-status pending">${pending.length} pending</span>`
          : `<span class="redemption-status clear">Clear</span>`;
        return `
          <div class="member-row">
            <div class="member-avatar">${m.name[0].toUpperCase()}</div>
            <div class="member-info">
              <div class="member-name">${m.name}</div>
              <div class="member-email">${m.email}</div>
              <div class="strikes-row">${pips} ${status}</div>
            </div>
            <div class="member-actions">
              <button class="icon-btn remove" onclick="removeMember('${m.id}')" title="Remove from cohort">✕</button>
              <button class="icon-btn" style="background:var(--red-lt);color:var(--red);" onclick="clearStrikes('${m.id}')" title="Clear strikes">↺</button>
            </div>
          </div>`;
      }).join('');

      document.getElementById('tab-members').innerHTML = `
        <div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
            <div class="card-title" style="margin-bottom:0;">Members</div>
            <select class="form-input" style="width:auto;font-size:0.8rem;padding:6px 10px;" onchange="membersCohortId=this.value;renderMembers()">
              ${cohortOptions}
            </select>
          </div>
          <div class="member-count-line" style="font-size:0.75rem;color:var(--muted);margin-bottom:12px;">${members.length} member${members.length!==1?'s':''} · starts ${mc.startDate}</div>
          <div>${rows || '<div class="empty-state">No members in this cohort yet.</div>'}</div>
        </div>
        <div class="card">
          <div class="card-title">Invite Member</div>
          <div class="form-field">
            <label class="form-label">Email address</label>
            <input class="form-input" id="inviteEmail" type="email" placeholder="member@email.com" />
          </div>
          <div class="form-field">
            <label class="form-label">Display name</label>
            <input class="form-input" id="inviteName" placeholder="First name" />
          </div>
          <div id="inviteFlash" class="flash"></div>
          <button class="btn primary full" style="margin-top:4px;" onclick="inviteMember()">Send Invite</button>
        </div>`;
    }

    function inviteMember() {
      const email = document.getElementById('inviteEmail')?.value?.trim().toLowerCase();
      const name  = document.getElementById('inviteName')?.value?.trim();
      const flash = document.getElementById('inviteFlash');
      flash.className = 'flash';

      const mc = db.getCohort(membersCohortId);
      if (!email || !name) { flash.textContent='Fill in both fields.'; flash.className='flash error'; return; }
      if (!mc)             { flash.textContent='No cohort selected.';  flash.className='flash error'; return; }
      if ((mc.memberIds||[]).length >= 10) { flash.textContent='Cohort is full (10 max).'; flash.className='flash error'; return; }

      // Check if user already exists
      let user = Object.values(db.getUsers()).find(u=>u.email===email);
      if (!user) {
        user = { id:`u_${db.uid()}`, email, name, role:'member' };
        db.upsertUser(user);
      }
      if (!mc.memberIds) mc.memberIds = [];
      if (!mc.memberIds.includes(user.id)) {
        mc.memberIds.push(user.id);
        db.upsertCohort(mc);
      }
      flash.textContent = `${name} added to ${mc.name}.`;
      flash.className = 'flash success';
      document.getElementById('inviteEmail').value = '';
      document.getElementById('inviteName').value  = '';
      setTimeout(()=>renderMembers(), 1200);
    }

    function removeMember(userId) {
      const mc = db.getCohort(membersCohortId);
      if (!mc) return;
      if (!confirm('Remove this member from the cohort?')) return;
      mc.memberIds = mc.memberIds.filter(id=>id!==userId);
      db.upsertCohort(mc);
      renderMembers();
    }

    function clearStrikes(userId) {
      if (!membersCohortId) return;
      if (!confirm('Clear all redemption strikes for this member?')) return;
      db.clearRedemptions(userId, membersCohortId);
      renderMembers();
    }

    // ════════════════════════════════════════════════════════════════════
    // TAB: GOALS
    // ════════════════════════════════════════════════════════════════════
    function renderGoals() {
      if (!cohort) { document.getElementById('tab-goals').innerHTML='<div class="empty-state">No active cohort.</div>'; return; }
      const members = cohort.memberIds.map(id=>db.getUser(id)).filter(Boolean);

      const memberPicker = `
        <div class="card">
          <div class="card-title">Select Member</div>
          <div class="form-field">
            <select class="form-select" onchange="goalsMemberId=this.value;renderGoals()">
              <option value="">— choose member —</option>
              ${members.map(m=>`<option value="${m.id}"${goalsMemberId===m.id?' selected':''}>${m.name}</option>`).join('')}
            </select>
          </div>
        </div>`;

      if (!goalsMemberId) {
        document.getElementById('tab-goals').innerHTML = memberPicker;
        return;
      }

      const goals  = db.getGoalsForUser(goalsMemberId, cohort.id);
      const member = db.getUser(goalsMemberId);
      const typeLabel = { daily_boolean:'Daily ✓', weekly_count:'Weekly count', daily_time:'Max time', daily_time_max:'Max time', daily_time_min:'Min time', milestone:'21-day goal', total_count:'21-day count', total_time_min:'21-day min time', total_time_max:'21-day max time' };
      const configLabel = g => {
        if (g.type==='weekly_count')  return `${g.config.weeklyTarget}x/week`;
        if (g.type==='daily_time' || g.type==='daily_time_max') return `max ${(g.config.weeklyMaxMinutes/60).toFixed(1)}h/week`;
        if (g.type==='daily_time_min') return `min ${(g.config.weeklyTargetMinutes/60).toFixed(1)}h/week`;
        if (g.type==='total_count')    return `${g.config.totalTarget} total`;
        if (g.type==='total_time_min') return `≥${g.config.totalTargetMinutes}min total`;
        if (g.type==='total_time_max') return `≤${g.config.totalMaxMinutes}min total`;
        return '';
      };

      const goalRows = goals.map(g => `
        <div class="goal-edit-row">
          <div style="flex:1;min-width:0;">
            <div class="goal-edit-name">${g.title}</div>
            <div class="goal-edit-type">${typeLabel[g.type]||g.type} ${configLabel(g)?'· '+configLabel(g):''}</div>
          </div>
          <button class="icon-btn remove" onclick="adminDeleteGoal('${g.id}')">✕</button>
        </div>`).join('');

      // Add goal form
      const pillStyle = (sel) => `style="padding:5px 11px;border-radius:100px;font-size:0.76rem;font-weight:600;cursor:pointer;border:1.5px solid;transition:all 0.15s;${sel?'background:var(--orange);color:#fff;border-color:var(--orange);':'background:var(--bg);color:var(--muted);border-color:var(--border);'}"`;
      const addForm = addGoalFormOpen ? `
        <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);">
          <div class="form-field">
            <label class="form-label">Goal name</label>
            <input class="form-input" id="agTitle" placeholder="e.g. Meditate" value="${addGoalTitle}" oninput="addGoalTitle=this.value" />
          </div>
          <div class="form-field">
            <label class="form-label">Time frame</label>
            <div style="display:flex;gap:6px;flex-wrap:wrap;">
              <button ${pillStyle(addGoalFrame==='daily')} onclick="addGoalFrame='daily';renderGoals()">Daily</button>
              <button ${pillStyle(addGoalFrame==='weekly')} onclick="addGoalFrame='weekly';renderGoals()">Weekly</button>
              <button ${pillStyle(addGoalFrame==='milestone')} onclick="addGoalFrame='milestone';renderGoals()">21 Days</button>
            </div>
          </div>
          <div class="form-field">
            <label class="form-label">Type</label>
            <div style="display:flex;gap:6px;flex-wrap:wrap;">
              <button ${pillStyle(addGoalMetric==='boolean')} onclick="addGoalMetric='boolean';renderGoals()">Yes / No</button>
              <button ${pillStyle(addGoalMetric==='count')} onclick="addGoalMetric='count';renderGoals()">Count</button>
              <button ${pillStyle(addGoalMetric==='min_time')} onclick="addGoalMetric='min_time';renderGoals()">Min time</button>
              <button ${pillStyle(addGoalMetric==='max_time')} onclick="addGoalMetric='max_time';renderGoals()">Max time</button>
            </div>
          </div>
          ${addGoalMetric==='count' ? `<div class="form-field"><label class="form-label">${addGoalFrame==='milestone'?'Total sessions over 21 days':'Sessions per week'}</label><input class="form-input" id="agCount" type="number" min="1" max="999" placeholder="${addGoalFrame==='milestone'?'10':'4'}" /></div>` : ''}
          ${addGoalMetric==='min_time'||addGoalMetric==='max_time' ? `<div class="form-field"><label class="form-label">${addGoalFrame==='milestone'?(addGoalMetric==='min_time'?'Total minimum over 21 days (minutes)':'Total maximum over 21 days (minutes)'):(addGoalMetric==='min_time'?'Weekly minimum (minutes)':'Weekly maximum (minutes)')}</label><input class="form-input" id="agTime" type="number" min="1" placeholder="${addGoalMetric==='min_time'?'60':'120'}" /></div>` : ''}
          <div class="btn-row">
            <button class="btn secondary" onclick="addGoalFormOpen=false;addGoalTitle='';renderGoals()">Cancel</button>
            <button class="btn primary" onclick="adminSaveGoal()">Add</button>
          </div>
        </div>` : `<button class="btn secondary full" style="margin-top:12px;" onclick="addGoalFormOpen=true;renderGoals()">+ Add Goal</button>`;

      document.getElementById('tab-goals').innerHTML = `
        ${memberPicker}
        <div class="card">
          <div class="card-title">${member?.name}'s Goals <small>${goals.length}/10</small></div>
          <div class="goals-list">${goalRows||'<div class="empty-state" style="padding:16px 0;">No goals yet.</div>'}</div>
          ${addForm}
        </div>`;
    }

    function adminDeleteGoal(goalId) {
      if (!confirm('Delete this goal?')) return;
      db.deleteGoal(goalId);
      renderGoals();
    }

    function adminSaveGoal() {
      const title = addGoalTitle.trim();
      if (!title || !goalsMemberId) return;
      const goals = db.getGoalsForUser(goalsMemberId, cohort.id);
      if (goals.length >= 10) { alert('Max 10 goals.'); return; }
      const config = {};
      let type;
      if (addGoalFrame === 'milestone') {
        if (addGoalMetric === 'boolean')  { type = 'milestone'; }
        if (addGoalMetric === 'count')    { type = 'total_count';    config.totalTarget        = parseInt(document.getElementById('agCount')?.value)||10; }
        if (addGoalMetric === 'min_time') { type = 'total_time_min'; config.totalTargetMinutes = parseInt(document.getElementById('agTime')?.value)||120; }
        if (addGoalMetric === 'max_time') { type = 'total_time_max'; config.totalMaxMinutes    = parseInt(document.getElementById('agTime')?.value)||300; }
      } else {
        if (addGoalMetric === 'boolean')  { type = 'daily_boolean'; }
        if (addGoalMetric === 'count')    { type = 'weekly_count'; config.weeklyTarget = parseInt(document.getElementById('agCount')?.value)||3; }
        if (addGoalMetric === 'min_time') { type = 'daily_time_min'; config.weeklyTargetMinutes = parseInt(document.getElementById('agTime')?.value)||60; }
        if (addGoalMetric === 'max_time') { type = 'daily_time_max'; config.weeklyMaxMinutes    = parseInt(document.getElementById('agTime')?.value)||120; }
      }
      db.upsertGoal({
        id:`g_${db.uid()}`, type, title, config,
        userId:goalsMemberId, cohortId:cohort.id,
        locked:false, createdAt:new Date().toISOString(), order:goals.length
      });
      addGoalFormOpen = false;
      addGoalFrame    = 'daily';
      addGoalMetric   = 'boolean';
      addGoalTitle    = '';
      renderGoals();
    }

    // ════════════════════════════════════════════════════════════════════
    // TAB: OVERRIDE
    // ════════════════════════════════════════════════════════════════════
    function renderOverride() {
      if (!cohort) { document.getElementById('tab-override').innerHTML='<div class="empty-state">No active cohort.</div>'; return; }
      const members = cohort.memberIds.map(id=>db.getUser(id)).filter(Boolean);

      const memberPicker = `
        <div class="form-field">
          <label class="form-label">Member</label>
          <select class="form-select" onchange="overrideMemberId=this.value;renderOverride()">
            <option value="">— choose member —</option>
            ${members.map(m=>`<option value="${m.id}"${overrideMemberId===m.id?' selected':''}>${m.name}</option>`).join('')}
          </select>
        </div>`;

      const datePicker = `
        <div class="form-field">
          <label class="form-label">Date</label>
          <input class="form-input" type="date" value="${overrideDate}"
            onchange="overrideDate=this.value;renderOverride()" />
        </div>`;

      let goalRows = '';
      if (overrideMemberId) {
        const goals = db.getGoalsForUser(overrideMemberId, cohort.id);
        goalRows = goals.map(g => {
          const c = db.getCheckin(g.id, overrideDate);
          if (g.type==='daily_boolean' || g.type==='milestone') {
            const on = !!(c?.value);
            return `
              <div class="override-goal-row">
                <div class="override-goal-name">${g.title}</div>
                <button class="override-toggle${on?' on':' off'}" onclick="overrideToggle('${g.id}','${overrideDate}',${!on})">
                  <div class="toggle-knob"></div>
                </button>
              </div>`;
          }
          if (g.type==='weekly_count' || g.type==='daily_time' || g.type==='daily_time_min' || g.type==='daily_time_max') {
            const val = c ? Number(c.value)||0 : 0;
            const unit = g.type==='weekly_count' ? 'sessions' : 'min';
            return `
              <div class="override-goal-row">
                <div class="override-goal-name">${g.title}</div>
                <input class="override-input" type="number" min="0" value="${val}" placeholder="0"
                  onchange="overrideValue('${g.id}','${overrideDate}',this.value)" />
                <span style="font-size:0.72rem;color:var(--muted);white-space:nowrap;">${unit}</span>
              </div>`;
          }
          return '';
        }).join('');
      }

      document.getElementById('tab-override').innerHTML = `
        <div class="card">
          <div class="card-title">Override Check-in</div>
          ${memberPicker}
          ${datePicker}
          ${overrideMemberId && goalRows ? `
            <div style="margin-top:4px;">
              <div class="section-label">Goals on ${overrideDate}</div>
              ${goalRows}
            </div>
            <div id="overrideFlash" class="flash" style="margin-top:10px;"></div>` :
            overrideMemberId ? '<div class="empty-state" style="padding:16px 0;">No goals for this member.</div>' : ''}
        </div>`;
    }

    function overrideToggle(goalId, date, newVal) {
      db.setCheckin(goalId, date, newVal, session.userId);
      flash('overrideFlash', 'Saved.', 'success');
      renderOverride();
    }

    function overrideValue(goalId, date, val) {
      db.setCheckin(goalId, date, parseInt(val)||0, session.userId);
      flash('overrideFlash', 'Saved.', 'success');
    }

    // ════════════════════════════════════════════════════════════════════
    // TAB: COHORTS
    // ════════════════════════════════════════════════════════════════════
    function renderCohorts() {
      const cohorts = Object.values(db.getCohorts()).sort((a,b)=>new Date(b.startDate)-new Date(a.startDate));

      const cohortCards = cohorts.map(c => {
        const day     = db.getCohortDay(c.startDate);
        const dayText = day<1 ? 'Upcoming' : day>21 ? 'Complete' : `Day ${day}`;
        const members = c.memberIds?.length||0;
        return `
          <div class="cohort-card${c.id===cohort?.id?' selected':''}">
            <div class="cohort-info">
              <div class="cohort-name">${c.name}</div>
              <div class="cohort-meta">Starts ${c.startDate} · ${members} member${members!==1?'s':''}</div>
            </div>
            <div class="cohort-day-badge">${dayText}</div>
          </div>`;
      }).join('');

      document.getElementById('tab-cohorts').innerHTML = `
        <div class="card">
          <div class="card-title">All Cohorts</div>
          <div style="display:flex;flex-direction:column;gap:8px;">
            ${cohortCards || '<div class="empty-state" style="padding:16px 0;">No cohorts yet.</div>'}
          </div>
        </div>
        <div class="card">
          <div class="card-title">Create New Cohort</div>
          <div class="form-field">
            <label class="form-label">Cohort name</label>
            <input class="form-input" id="newCohortName" placeholder="e.g. June 2 Cohort" />
          </div>
          <div class="form-field">
            <label class="form-label">Start date</label>
            <input class="form-input" id="newCohortDate" type="date" value="${new Date().toISOString().split('T')[0]}" />
          </div>
          <div id="newCohortFlash" class="flash"></div>
          <button class="btn primary full" style="margin-top:4px;" onclick="createCohort()">Create Cohort</button>
        </div>`;
    }

    function createCohort() {
      const name      = document.getElementById('newCohortName')?.value?.trim();
      const startDate = document.getElementById('newCohortDate')?.value;
      const flashEl   = document.getElementById('newCohortFlash');
      flashEl.className = 'flash';

      if (!name || !startDate) { flashEl.textContent='Fill in all fields.'; flashEl.className='flash error'; return; }

      const id = `c_${db.uid()}`;
      db.upsertCohort({
        id, name, startDate,
        memberIds: [session.userId],
        createdBy: session.userId,
        createdAt: new Date().toISOString()
      });
      flashEl.textContent = `${name} created.`;
      flashEl.className = 'flash success';
      document.getElementById('newCohortName').value = '';
      setTimeout(()=>renderCohorts(), 1000);
    }

    // ── Helpers ──────────────────────────────────────────────────────────
    function flash(id, msg, type) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = msg;
      el.className = `flash ${type}`;
      setTimeout(()=>{ el.className='flash'; }, 2500);
    }

    function logout() { db.clearSession(); window.location.href='index.html'; }

    // ── Initial render ────────────────────────────────────────────────────
    renderMembers();
  </script>
</body>
</html>
