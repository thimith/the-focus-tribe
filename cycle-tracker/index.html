<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cycle Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    body {
      background-color: #120d18;
      font-family: 'Inter', sans-serif;
      color: #f0e8f5;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
    }

    .app-wrap { position: relative; z-index: 1; }

    h1 {
      font-family: 'Fraunces', serif;
      letter-spacing: -0.03em;
    }

    .person-card {
      background: linear-gradient(135deg, #1e1328 0%, #221530 100%);
      border: 1px solid rgba(232, 100, 140, 0.12);
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.03), inset 0 1px 0 rgba(255,255,255,0.05);
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s ease;
    }

    .person-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.5), 0 0 0 1px rgba(232,100,140,0.18), inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .day-cell {
      width: 32px;
      height: 48px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 500;
      gap: 3px;
      transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
      flex-shrink: 0;
      cursor: default;
    }

    .day-cell:hover { transform: scale(1.08); }

    .day-neutral {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      color: rgba(240,232,245,0.4);
    }

    .day-period {
      background: linear-gradient(145deg, #c0394f, #a52d41);
      border: 1px solid rgba(224,92,110,0.5);
      color: #fff;
      box-shadow: 0 2px 12px rgba(192,57,79,0.45), inset 0 1px 0 rgba(255,255,255,0.15);
    }

    .day-ovulation {
      background: linear-gradient(145deg, #2e8f6a, #247a5a);
      border: 1px solid rgba(76,175,138,0.5);
      color: #fff;
      box-shadow: 0 2px 12px rgba(46,143,106,0.45), inset 0 1px 0 rgba(255,255,255,0.15);
    }

    .day-fertile {
      background: linear-gradient(145deg, #206e52, #1a5a43);
      border: 1px solid rgba(76,175,138,0.3);
      color: rgba(255,255,255,0.8);
      box-shadow: 0 2px 8px rgba(46,143,106,0.25), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .today-cell {
      outline: 2px solid rgba(248,128,200,0.7);
      outline-offset: 2px;
    }

    .btn-add {
      background: linear-gradient(135deg, #c0394f, #9e2d41);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 14px;
      padding: 10px 20px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(192,57,79,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
      transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-add:hover {
      transform: translateY(-1px) scale(1.02);
      box-shadow: 0 6px 20px rgba(192,57,79,0.55), inset 0 1px 0 rgba(255,255,255,0.2);
    }

    .btn-add:active { transform: scale(0.97); }
    .btn-add:focus-visible { outline: 2px solid #e05c6e; outline-offset: 3px; }

    .btn-remove {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: rgba(240,232,245,0.35);
      width: 28px;
      height: 28px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      flex-shrink: 0;
      line-height: 1;
    }

    .btn-remove:hover {
      background: rgba(192,57,79,0.2);
      border-color: rgba(192,57,79,0.5);
      color: #e05c6e;
    }

    .btn-remove:focus-visible { outline: 2px solid #e05c6e; outline-offset: 2px; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(10,7,16,0.75);
      backdrop-filter: blur(6px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .modal-backdrop.open { opacity: 1; pointer-events: all; }

    .modal {
      background: linear-gradient(160deg, #261a33 0%, #1e1228 100%);
      border: 1px solid rgba(232,100,140,0.2);
      border-radius: 20px;
      padding: 32px;
      width: 360px;
      max-width: 90vw;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.07);
      transform: translateY(16px);
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }

    .modal-backdrop.open .modal { transform: translateY(0); }

    .input-field {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 10px 14px;
      color: #f0e8f5;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      box-sizing: border-box;
    }

    .input-field:focus {
      border-color: rgba(224,92,110,0.6);
      box-shadow: 0 0 0 3px rgba(192,57,79,0.15);
    }

    .input-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(240,232,245,0.5);
      margin-bottom: 6px;
      display: block;
    }

    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, #c0394f, #9e2d41);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 14px;
      padding: 12px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(192,57,79,0.35), inset 0 1px 0 rgba(255,255,255,0.15);
      transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s ease;
    }

    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(192,57,79,0.5); }
    .btn-primary:active { transform: scale(0.98); }

    .btn-secondary {
      width: 100%;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: rgba(240,232,245,0.6);
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 14px;
      padding: 12px;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .btn-secondary:hover { background: rgba(255,255,255,0.05); color: #f0e8f5; }

    .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

    .day-label-top {
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      opacity: 0.7;
      line-height: 1;
    }

    .day-num { font-size: 12px; font-weight: 600; line-height: 1; }

    .day-strip {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .day-strip::-webkit-scrollbar { display: none; }

    .empty-state {
      border: 2px dashed rgba(232,100,140,0.15);
      border-radius: 16px;
      padding: 56px 24px;
      text-align: center;
      color: rgba(240,232,245,0.3);
    }
  </style>
</head>
<body>
<div class="app-wrap" style="max-width:1100px;margin:0 auto;padding:40px 20px;">

  <!-- Header -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;">
    <div>
      <h1 style="font-size:28px;font-weight:600;color:#f0e8f5;margin:0;">Cycle Tracker</h1>
      <p style="font-size:13px;color:rgba(240,232,245,0.4);margin:4px 0 0;line-height:1.5;">Full 28-day cycle &middot; pink ring = today</p>
    </div>
    <button class="btn-add" onclick="openModal()">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v11M1 6.5h11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      Add person
    </button>
  </div>

  <!-- Legend -->
  <div style="display:flex;align-items:center;gap:20px;margin-bottom:24px;flex-wrap:wrap;">
    <div style="display:flex;align-items:center;gap:7px;font-size:12px;color:rgba(240,232,245,0.45);">
      <div class="legend-dot" style="background:#c0394f;"></div>Period (days 1–5)
    </div>
    <div style="display:flex;align-items:center;gap:7px;font-size:12px;color:rgba(240,232,245,0.45);">
      <div class="legend-dot" style="background:#2e8f6a;"></div>Ovulation (day 14)
    </div>
    <div style="display:flex;align-items:center;gap:7px;font-size:12px;color:rgba(240,232,245,0.45);">
      <div class="legend-dot" style="background:#206e52;"></div>Fertile window (days 11–17)
    </div>
  </div>

  <!-- List -->
  <div id="people-list" style="display:flex;flex-direction:column;gap:12px;">
    <div class="empty-state" id="empty-state">
      <div style="font-size:32px;margin-bottom:12px;opacity:0.4;">◯</div>
      <p style="font-size:14px;margin:0;">No one added yet.<br><span style="color:rgba(240,232,245,0.5);">Click <strong>Add person</strong> to get started.</span></p>
    </div>
  </div>

</div>

<!-- Modal -->
<div class="modal-backdrop" id="modal" onclick="handleBackdropClick(event)">
  <div class="modal">
    <h2 style="font-family:'Fraunces',serif;font-size:22px;font-weight:600;margin:0 0 4px;letter-spacing:-0.02em;color:#f0e8f5;">Add person</h2>
    <p style="font-size:13px;color:rgba(240,232,245,0.4);margin:0 0 24px;line-height:1.6;">Enter their name and the first day of their last period.</p>

    <div style="margin-bottom:16px;">
      <label class="input-label" for="input-name">Name</label>
      <input class="input-field" id="input-name" type="text" placeholder="e.g. Sarah" autocomplete="off" />
    </div>

    <div style="margin-bottom:28px;">
      <label class="input-label" for="input-date">Last period start date</label>
      <input class="input-field" id="input-date" type="date" />
    </div>

    <div style="display:flex;flex-direction:column;gap:10px;">
      <button class="btn-primary" onclick="addPerson()">Add to tracker</button>
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
  let people = JSON.parse(localStorage.getItem('cycle-tracker') || '[]');

  function save() {
    localStorage.setItem('cycle-tracker', JSON.stringify(people));
  }

  // Cycle constants
  const CYCLE = 28, PERIOD = 5, OVULATION = 14, FERTILE_S = 11, FERTILE_E = 17;

  function cycleDay(lastPeriodStr, targetDate) {
    const start = new Date(lastPeriodStr + 'T00:00:00');
    const target = new Date(targetDate);
    target.setHours(0,0,0,0);
    const diff = Math.floor((target - start) / 86400000);
    return ((diff % CYCLE) + CYCLE) % CYCLE + 1;
  }

  function status(day) {
    if (day >= 1 && day <= PERIOD) return 'period';
    if (day === OVULATION) return 'ovulation';
    if (day >= FERTILE_S && day <= FERTILE_E) return 'fertile';
    return 'neutral';
  }

  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function fmt(str) {
    const d = new Date(str + 'T00:00:00');
    return MONS[d.getMonth()] + ' ' + d.getDate();
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderAll() {
    const list = document.getElementById('people-list');
    [...list.querySelectorAll('.person-card')].forEach(el => el.remove());
    document.getElementById('empty-state').style.display = people.length ? 'none' : '';

    const today = new Date(); today.setHours(0,0,0,0);

    people.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'person-card';
      card.style.cssText = 'padding:16px 20px;display:flex;align-items:center;gap:16px;';

      // Name
      const nameCol = document.createElement('div');
      nameCol.style.cssText = 'min-width:96px;max-width:96px;';
      nameCol.innerHTML = `
        <div style="font-weight:600;font-size:15px;color:#f0e8f5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(p.name)}</div>
        <div style="font-size:11px;color:rgba(240,232,245,0.3);margin-top:3px;">Since ${fmt(p.date)}</div>
      `;

      // Strip — today + 28 days, same dates across all rows
      const strip = document.createElement('div');
      strip.className = 'day-strip';
      strip.style.flex = '1';

      for (let d = 0; d < 28; d++) {
        const cellDate = new Date(today);
        cellDate.setDate(today.getDate() + d);

        const cd = cycleDay(p.date, cellDate);
        const st = status(cd);
        const isToday = d === 0;

        const cell = document.createElement('div');
        cell.className = 'day-cell day-' + st + (isToday ? ' today-cell' : '');

        const tooltip = st === 'period' ? `Day ${cd} – Period`
          : st === 'ovulation' ? `Day ${cd} – Ovulation`
          : st === 'fertile' ? `Day ${cd} – Fertile window`
          : `Day ${cd}`;
        cell.title = tooltip;

        cell.innerHTML = `
          <span class="day-label-top">${MONS[cellDate.getMonth()].toUpperCase()}</span>
          <span class="day-num">${cellDate.getDate()}</span>
        `;
        strip.appendChild(cell);
      }

      // Remove
      const rm = document.createElement('button');
      rm.className = 'btn-remove';
      rm.innerHTML = '&times;';
      rm.title = 'Remove ' + p.name;
      rm.setAttribute('aria-label', 'Remove ' + p.name);
      rm.onclick = () => { if (confirm(`Remove ${p.name}?`)) { people.splice(i,1); save(); renderAll(); } };

      card.appendChild(nameCol);
      card.appendChild(strip);
      card.appendChild(rm);
      list.appendChild(card);
    });
  }

  function openModal() {
    document.getElementById('modal').classList.add('open');
    setTimeout(() => document.getElementById('input-name').focus(), 80);
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }

  function handleBackdropClick(e) {
    if (e.target === document.getElementById('modal')) closeModal();
  }

  function shake(el) {
    el.style.transition = 'transform 0.35s cubic-bezier(0.36,0.07,0.19,0.97)';
    ['-6px','6px','-3px','0'].forEach((v,i) => setTimeout(() => el.style.transform = `translateX(${v})`, i*70));
    el.style.borderColor = 'rgba(192,57,79,0.8)';
    setTimeout(() => el.style.borderColor = '', 800);
  }

  function addPerson() {
    const nameEl = document.getElementById('input-name');
    const dateEl = document.getElementById('input-date');
    const name = nameEl.value.trim();
    const date = dateEl.value;
    if (!name) { shake(nameEl); nameEl.focus(); return; }
    if (!date) { shake(dateEl); dateEl.focus(); return; }
    people.push({ name, date });
    save();
    renderAll();
    closeModal();
    nameEl.value = '';
    dateEl.value = new Date().toISOString().split('T')[0];
  }

  document.addEventListener('keydown', e => {
    const open = document.getElementById('modal').classList.contains('open');
    if (e.key === 'Escape' && open) closeModal();
    if (e.key === 'Enter' && open) addPerson();
  });

  // Default date = today
  document.getElementById('input-date').value = new Date().toISOString().split('T')[0];

  renderAll();
</script>
</body>
</html>
